{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <h1>To-Do App</h1>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Task Name:</label>
            <input type="text" id="name" name="taskname" placeholder="What needs to be done?" required>
        </div>
        
        <div class="form-group">
            <label for="date">Due Date:</label>
            <input type="date" id="date" name="taskdate" required>
        </div>

        <button type="submit">Add Task</button>
    </form>

    <div class="todo-container">
        {% for i in item %}
        <div class="todo-item">
            <div class="todo-details">
                <p class="task-name">{{ i.taskname }}</p>
                <p class="task-date">📅 {{ i.taskdate }}</p>
            </div>
            <div class="buttons">
                <button class="btn-update"><a href="{% url 'update' i.id %}">Update</a></button>
                <button class="btn-delete"><a href="{% url 'delete' i.id %}">Delete</a></button>
            </div>
        </div>
        {% empty %}
        <p style="text-align: center; color: #718096;">No tasks yet. Add one above!</p>
        {% endfor %}
    </div>

</body>
</html>
