{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <h>TO-DO APP</h>
    <form method="POST">
        {% csrf_token %}
        <label style="color: black;background-color: rgb(23, 138, 138);" for="name">Name:</label>
        <input type="text" id="name" name="taskname"><br><br>
        <label style="color: black;background-color: rgb(11, 140, 149);"date">Date:</label>
        <input type="date" id="date" name="taskdate"><br><br>
        <button type="submit">Submit</button>
    </form>
    <div>
        {% for i in item %}
        <p>{{i.taskname}}</p>
        <p>{{i.taskdate}}</p>
        <div class="buttons">
        <button ><a href="{% url 'delete' i.id %}">Delete</a></button>
        <button><a href="{% url 'update' i.id %}">update</a></button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
