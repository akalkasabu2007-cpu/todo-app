
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Task</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <h1>Update Task</h1>

    <form method="POST" id="page2">
        {% csrf_token %}
        <div class="form-group">
            <label for="update-name">Task Name:</label>
            <input type="text" id="update-name" name="taskname" value="{{ a.taskname }}" required>
        </div>

        <div class="form-group">
            <label for="update-date">Due Date:</label>
            <input type="date" id="update-date" name="taskdate" value="{{ a.taskdate|date:'Y-m-d' }}" required>
        </div>

        <button type="submit">Save Changes</button>
    </form>

</body>
</html>
